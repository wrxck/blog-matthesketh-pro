server {
    listen 60612;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Pre-rendered blog pages (served to crawlers and users)
    location ~ ^/blog/([^/]+)/?$ {
        try_files /blog/$1/index.html /index.html;
        add_header Cache-Control "no-cache";
    }

    # AMP pages
    location ~ ^/amp/blog/([^/]+)/?$ {
        try_files /amp/blog/$1/index.html =404;
    }

    # OG images
    location /og/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # HTML pages — never cache (ensures fresh chunk references after deploys)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(svg|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location ~* \.(xml)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css text/html application/json application/javascript text/xml application/xml;
}
