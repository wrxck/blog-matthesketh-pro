services:
  blog-matthesketh-pro:
    build:
      context: .
    container_name: blog-matthesketh-pro
    ports:
      - "127.0.0.1:60612:60612"
    volumes:
      - blog-data:/app/data
      - blog-content:/app/blog/content
    environment:
      - ADMIN_HOST=admin.matthesketh.pro
      - RP_ID=matthesketh.pro
      - ORIGIN=https://admin.matthesketh.pro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

volumes:
  blog-data:
  blog-content:
